<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 TJHS 联课处老师授课时间表</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 主容器 / Main Container -->
    <div id="generateTimetable">
        
        <!-- 实时时钟与日期显示 / Live Clock and Date Display -->
        <h1 id="currentTime" class="no-print"></h1>

        <!-- 交互控件区域 / Interaction Controls (Hidden during print) -->
        <div class="controls no-print">
            <label for="daySelect">选择星期 / Select Day: </label>
            <select id="daySelect" onchange="changeDay()">
                <option value="All">全部 (星期一至五) / All (Mon - Fri)</option>
                <option value="Monday">星期一 / Monday</option>
                <option value="Tuesday">星期二 / Tuesday</option>
                <option value="Wednesday">星期三 / Wednesday</option>
                <option value="Thursday">星期四 / Thursday</option>
                <option value="Friday">星期五 / Friday</option>
            </select>
        </div>

        <!-- 时间表标题 / Timetable Header -->
        <header id="timetableTitle">
            <h1>2026 联课处老师授课时间表</h1>
            <h2>TJHS Co-Curricular Teacher Class Schedule</h2>
        </header>

        <!-- 时间表主体 / Main Timetable Table -->
        <table id="mainTable">
            <thead id="tableHeader">
                <!-- 由 JavaScript 动态生成 / Generated by JS -->
            </thead>
            <tbody id="teacherRows">
                <!-- 由 JavaScript 动态生成 / Generated by JS -->
            </tbody>
        </table>
    </div>

    <!-- 核心逻辑脚本 / Core Application Logic -->
    <script src="script.js"></script>
</body>

</html>
