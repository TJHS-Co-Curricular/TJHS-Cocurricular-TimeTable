<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>2026 TJHS Co-Curricular Teacher Timetable</title>
</head>

<body>
    <div id="generateTimetable">
        <h1 id="currentTime" class="no-print"></h1>
        <div style="text-align: center; margin-bottom: 20px;" class="no-print">
            <label for="daySelect">选择星期 / Select Day: </label>
            <select id="daySelect" onchange="changeDay()">
                <option value="All">All (Mon - Fri)</option>
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
            </select>
            <br><br>
            <!-- <button onclick="window.print()">Print / Save as PDF</button> -->
            <!-- <button onclick="exportFullCSV()">Export Full CSV</button> -->
        </div>
        <h1 id="timetableTitle">2026 联课处老师时间表<br>TJHS Co-Curricular Teacher Timetable</h1>
        <table id="mainTable">
            <thead id="tableHeader">
                <!-- Generated by JS -->
            </thead>
            <tbody id="teacherRows">
                <!-- Generated by JS -->
            </tbody>
        </table>
    </div>
</body>
<script src="script.js"></script>

</html>
